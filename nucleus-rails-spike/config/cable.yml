# Dev uses solid_cable on the primary database so we exercise the same
# adapter as production (minus multi-db isolation). solid_cable_messages
# lives in the primary schema via a regular migration.
development:
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
